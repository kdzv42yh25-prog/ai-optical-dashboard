<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI光模块产业链投资看板 - 实时行情版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0e1a', 800: '#111827', 700: '#1f2937', 600: '#374151' },
                        accent: { 400: '#3b82f6', 500: '#6366f1', 600: '#4f46e5' },
                        success: '#10b981', danger: '#ef4444', warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #e5e7eb; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.3); }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-pulse-slow { animation: pulseSlow 2s ease-in-out infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseSlow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .stock-row:hover { background: rgba(59, 130, 246, 0.08); }
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-core { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-satellite { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .badge-watch { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .badge-mid { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
        .badge-short { background: rgba(236, 72, 153, 0.15); color: #ec4899; }
        .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; }
        .live-dot.active { animation: pulseSlow 1.5s ease-in-out infinite; box-shadow: 0 0 8px #10b981; }
        .price-up { color: #ff4d4f; }
        .price-down { color: #10b981; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; border: none; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-connected { color: #10b981; }
        .status-error { color: #ef4444; }
        .status-loading { color: #f59e0b; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // ==================== 标的基础数据 ====================
        const STOCKS_BASE = [
            { code: "300308.SZ", name: "中际旭创", category: "光模块龙头", horizon: "中期(1-3年)", position: "核心持仓", revenue: 382.40, profit: 107.97, pe: 18.5, peg: 0.17, roe: 36.3, margin: 42.0, target: 220.0, shares: 11.11, tencentCode: "sz300308" },
            { code: "300502.SZ", name: "新易盛", category: "光模块", horizon: "中期(1-3年)", position: "核心持仓", revenue: 248.42, profit: 95.32, pe: 16.2, peg: 0.07, roe: 53.0, margin: 42.5, target: 260.0, shares: 7.10, tencentCode: "sz300502" },
            { code: "300394.SZ", name: "天孚通信", category: "光器件/光引擎", horizon: "短线(6-12月)", position: "卫星持仓", revenue: 51.63, profit: 20.17, pe: 22.0, peg: 0.44, roe: 41.9, margin: 54.0, target: 650.0, shares: 0.78, tencentCode: "sz300394" },
            { code: "688498.SH", name: "源杰科技", category: "光芯片", horizon: "短线(6-12月)", position: "卫星持仓", revenue: 6.01, profit: 1.91, pe: 85.0, peg: 99.99, roe: 8.68, margin: 35.0, target: 220.0, shares: 0.85, tencentCode: "sh688498" },
            { code: "300476.SZ", name: "胜宏科技", category: "PCB", horizon: "短线(6-12月)", position: "卫星持仓", revenue: 192.92, profit: 43.12, pe: 14.5, peg: 0.05, roe: 35.56, margin: 35.2, target: 90.0, shares: 8.70, tencentCode: "sz300476" },
            { code: "002463.SZ", name: "沪电股份", category: "PCB", horizon: "短线(6-12月)", position: "卫星持仓", revenue: 189.45, profit: 38.22, pe: 18.0, peg: 0.38, roe: 28.57, margin: 36.9, target: 45.0, shares: 19.24, tencentCode: "sz002463" },
            { code: "688313.SH", name: "仕佳光子", category: "光芯片", horizon: "短线(6-12月)", position: "卫星持仓", revenue: 21.29, profit: 3.72, pe: 35.0, peg: 0.07, roe: 27.10, margin: 33.2, target: 35.0, shares: 4.59, tencentCode: "sh688313" },
            { code: "000988.SZ", name: "华工科技", category: "光模块", horizon: "短线(6-12月)", position: "卫星持仓", revenue: 143.55, profit: 14.71, pe: 28.0, peg: 1.37, roe: 13.97, margin: 21.2, target: 50.0, shares: 10.06, tencentCode: "sz000988" },
            { code: "002281.SZ", name: "光迅科技", category: "光模块", horizon: "短线(6-12月)", position: "卫星持仓", revenue: 119.29, profit: 9.46, pe: 32.0, peg: 0.74, roe: 9.88, margin: 23.4, target: 45.0, shares: 8.07, tencentCode: "sz002281" },
            { code: "603083.SH", name: "剑桥科技", category: "光模块", horizon: "短线(6-12月)", position: "观察持仓", revenue: 48.23, profit: 2.63, pe: 55.0, peg: 0.96, roe: 4.5, margin: 22.3, target: 48.0, shares: 3.53, tencentCode: "sh603083" },
        ];

        // ==================== 腾讯财经 JSONP 获取 ====================
        const fetchTencentQuotes = () => {
            return new Promise((resolve, reject) => {
                const codes = STOCKS_BASE.map(s => s.tencentCode).join(",");
                const url = `https://qt.gtimg.cn/q=${codes}`;

                // 创建 script 标签进行 JSONP 请求
                const script = document.createElement('script');
                script.src = url;
                script.charset = 'gb2312';

                // 设置超时
                const timeout = setTimeout(() => {
                    reject(new Error('Timeout'));
                    cleanup();
                }, 10000);

                const cleanup = () => {
                    clearTimeout(timeout);
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                };

                script.onload = () => {
                    try {
                        const quotes = {};
                        STOCKS_BASE.forEach(stock => {
                            const varName = `v_${stock.tencentCode}`;
                            const data = window[varName];
                            if (data) {
                                const parts = data.split('~');
                                if (parts.length > 3) {
                                    quotes[stock.code] = {
                                        name: parts[1],
                                        price: parseFloat(parts[3]) || 0,
                                        prevClose: parseFloat(parts[4]) || 0,
                                        open: parseFloat(parts[5]) || 0,
                                        volume: parseInt(parts[6]) || 0,
                                        bid1: parseFloat(parts[9]) || 0,
                                        ask1: parseFloat(parts[19]) || 0,
                                        high: parseFloat(parts[33]) || 0,
                                        low: parseFloat(parts[34]) || 0,
                                        change: parseFloat(parts[32]) || 0,
                                        changeAmount: parseFloat(parts[31]) || 0,
                                        turnover: parseFloat(parts[37]) || 0,
                                        pe: parseFloat(parts[39]) || 0,
                                        marketCap: parseFloat(parts[44]) || 0,
                                        time: parts[30] || '',
                                        isReal: true
                                    };
                                }
                            }
                        });
                        resolve(quotes);
                    } catch (e) {
                        reject(e);
                    } finally {
                        cleanup();
                    }
                };

                script.onerror = () => {
                    reject(new Error('Script load failed'));
                    cleanup();
                };

                document.head.appendChild(script);
            });
        };

        // ==================== 工具函数 ====================
        const getBadgeClass = (type) => {
            if (type === '核心持仓') return 'badge-core';
            if (type === '卫星持仓') return 'badge-satellite';
            return 'badge-watch';
        };
        const getHorizonClass = (h) => h.includes('中期') ? 'badge-mid' : 'badge-short';

        // ==================== 组件：统计卡片 ====================
        const StatCard = ({ title, value, subtitle, icon, color = 'blue' }) => {
            const colorMap = {
                blue: 'from-blue-500/20 to-indigo-500/20 border-blue-500/30',
                green: 'from-emerald-500/20 to-teal-500/20 border-emerald-500/30',
                purple: 'from-purple-500/20 to-pink-500/20 border-purple-500/30',
                amber: 'from-amber-500/20 to-orange-500/20 border-amber-500/30',
            };
            return (
                <div className={`glass rounded-xl p-5 card-hover bg-gradient-to-br ${colorMap[color]} border`}>
                    <div className="flex items-center justify-between mb-3">
                        <span className="text-gray-400 text-sm">{title}</span>
                        <span className="text-2xl">{icon}</span>
                    </div>
                    <div className="text-2xl font-bold text-white mb-1">{value}</div>
                    <div className="text-xs text-gray-500">{subtitle}</div>
                </div>
            );
        };

        // ==================== 组件：实时行情卡片 ====================
        const RealTimeCard = ({ stock, quote, onClick }) => {
            const change = quote?.change || 0;
            const price = quote?.price || 0;
            const marketCap = price > 0 ? (price * stock.shares).toFixed(0) : '-';
            const isUp = change >= 0;
            const isReal = quote?.isReal === true;

            return (
                <div className="glass rounded-xl p-4 card-hover cursor-pointer relative overflow-hidden" onClick={onClick}>
                    {!isReal && price > 0 && <div className="absolute top-2 right-2 text-[10px] text-gray-600 bg-gray-800/50 px-1.5 py-0.5 rounded">同步中</div>}
                    <div className="flex items-center justify-between mb-2">
                        <div>
                            <div className="font-bold text-white">{stock.name}</div>
                            <div className="text-xs text-gray-500">{stock.code}</div>
                        </div>
                        <span className={`badge ${getBadgeClass(stock.position)}`}>{stock.position}</span>
                    </div>
                    <div className="flex items-end justify-between">
                        <div>
                            <div className={`text-2xl font-bold ${price > 0 ? (isUp ? 'price-up' : 'price-down') : 'text-gray-500'}`}>
                                {price > 0 ? `¥${price.toFixed(2)}` : '加载中...'}
                            </div>
                            <div className={`text-sm ${price > 0 ? (isUp ? 'price-up' : 'price-down') : 'text-gray-500'}`}>
                                {price > 0 ? `${isUp ? '+' : ''}${change.toFixed(2)}% ${isUp ? '▲' : '▼'}` : ''}
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="text-xs text-gray-400">市值</div>
                            <div className="text-sm text-white">{marketCap !== '-' ? `${marketCap}亿` : '-'}</div>
                        </div>
                    </div>
                    <div className="mt-3 flex gap-2 text-xs">
                        <span className="text-gray-500">PE: {stock.pe}</span>
                        <span className="text-gray-500">|</span>
                        <span className="text-gray-500">PEG: {stock.peg > 50 ? 'N/A' : stock.peg}</span>
                    </div>
                </div>
            );
        };

        // ==================== 组件：图表包装器 ====================
        const ChartCanvas = ({ id, type, data, options }) => {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);
            useEffect(() => {
                if (canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = canvasRef.current.getContext('2d');
                    chartRef.current = new Chart(ctx, { type, data, options });
                }
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data, options, type]);
            return <canvas ref={canvasRef} id={id} />;
        };

        // ==================== 组件：市值分布饼图 ====================
        const MarketCapPie = ({ stocks, quotes }) => {
            const data = {
                labels: stocks.map(s => s.name),
                datasets: [{
                    data: stocks.map(s => {
                        const q = quotes[s.code];
                        const price = q?.price || 0;
                        return price > 0 ? (price * s.shares).toFixed(0) : 0;
                    }),
                    backgroundColor: ['#3b82f6','#6366f1','#8b5cf6','#a78bfa','#10b981','#14b8a6','#06b6d4','#0ea5e9','#f59e0b','#ef4444'],
                    borderColor: '#0a0e1a', borderWidth: 2,
                }]
            };
            const options = {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right', labels: { color: '#9ca3af', font: { size: 10 }, boxWidth: 12, padding: 8 } },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)', titleColor: '#e5e7eb', bodyColor: '#e5e7eb',
                        borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
                        callbacks: {
                            label: (ctx) => {
                                const total = ctx.dataset.data.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);
                                const pct = total > 0 ? ((parseFloat(ctx.parsed) / total) * 100).toFixed(1) : 0;
                                return `${ctx.label}: ${ctx.parsed}亿 (${pct}%)`;
                            }
                        }
                    }
                }
            };
            return <div style={{ height: 300 }}><ChartCanvas id="marketcap-pie" type="doughnut" data={data} options={options} /></div>;
        };

        // ==================== 组件：估值对比图 ====================
        const ValuationChart = ({ stocks }) => {
            const data = {
                labels: stocks.map(s => s.name),
                datasets: [
                    { label: 'PE-TTM', data: stocks.map(s => s.pe), backgroundColor: 'rgba(59, 130, 246, 0.7)', borderColor: '#3b82f6', borderWidth: 1, borderRadius: 4, yAxisID: 'y' },
                    { label: 'PEG', data: stocks.map(s => Math.min(s.peg, 3)), backgroundColor: 'rgba(16, 185, 129, 0.7)', borderColor: '#10b981', borderWidth: 1, borderRadius: 4, yAxisID: 'y1' }
                ]
            };
            const options = {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 } } }, tooltip: { backgroundColor: 'rgba(17, 24, 39, 0.9)', titleColor: '#e5e7eb', bodyColor: '#e5e7eb', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 45 } },
                    y: { type: 'linear', display: true, position: 'left', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font: { size: 10 } }, title: { display: true, text: 'PE', color: '#6b7280', font: { size: 10 } } },
                    y1: { type: 'linear', display: true, position: 'right', grid: { display: false }, ticks: { color: '#6b7280', font: { size: 10 } }, title: { display: true, text: 'PEG', color: '#6b7280', font: { size: 10 } } }
                }
            };
            return <div style={{ height: 300 }}><ChartCanvas id="valuation" type="bar" data={data} options={options} /></div>;
        };

        // ==================== 页面：Dashboard ====================
        const Dashboard = ({ onSelectStock, quotes, lastUpdate, status, onRefresh, isLoading }) => {
            const [sortBy, setSortBy] = useState('marketCap');
            const [filterCategory, setFilterCategory] = useState('all');

            const totalMarketCap = useMemo(() => {
                return STOCKS_BASE.reduce((sum, s) => {
                    const q = quotes[s.code];
                    const price = q?.price || 0;
                    return sum + (price > 0 ? price * s.shares : 0);
                }, 0);
            }, [quotes]);

            const avgPE = (STOCKS_BASE.reduce((sum, s) => sum + s.pe, 0) / STOCKS_BASE.length).toFixed(1);
            const avgPEG = (STOCKS_BASE.filter(s => s.peg < 50).reduce((sum, s) => sum + s.peg, 0) / STOCKS_BASE.filter(s => s.peg < 50).length).toFixed(2);

            const filteredStocks = useMemo(() => {
                let result = [...STOCKS_BASE];
                if (filterCategory !== 'all') {
                    result = result.filter(s => s.category === filterCategory || (filterCategory === '光模块' && s.category.includes('光模块')));
                }
                return result.sort((a, b) => {
                    const qa = quotes[a.code], qb = quotes[b.code];
                    const pa = qa?.price || 0, pb = qb?.price || 0;
                    const ma = pa > 0 ? pa * a.shares : 0, mb = pb > 0 ? pb * b.shares : 0;
                    if (sortBy === 'marketCap') return mb - ma;
                    if (sortBy === 'pe') return a.pe - b.pe;
                    if (sortBy === 'peg') return a.peg - b.peg;
                    if (sortBy === 'roe') return b.roe - a.roe;
                    if (sortBy === 'change') return (qb?.change || 0) - (qa?.change || 0);
                    return 0;
                });
            }, [sortBy, filterCategory, quotes]);

            const categories = ['all', '光模块龙头', '光模块', '光器件/光引擎', '光芯片', 'PCB'];

            const statusText = {
                connected: { text: '✅ 已连接腾讯财经', color: 'status-connected' },
                error: { text: '❌ 连接失败', color: 'status-error' },
                loading: { text: '⏳ 同步中...', color: 'status-loading' },
                idle: { text: '⚪ 等待连接', color: 'text-gray-500' }
            }[status] || statusText.idle;

            return (
                <div className="animate-fade-in space-y-6">
                    {/* 状态栏 */}
                    <div className="glass rounded-xl p-4 flex flex-wrap items-center justify-between gap-3">
                        <div className="flex items-center gap-3">
                            <span className={`live-dot ${status === 'connected' ? 'active' : ''}`}></span>
                            <span className={`text-sm font-medium ${statusText.color}`}>
                                {isLoading ? '⏳ 同步中...' : statusText.text}
                            </span>
                            <span className="text-xs text-gray-500">| 最后更新: {lastUpdate}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={onRefresh} disabled={isLoading} className="btn-primary flex items-center gap-2">
                                {isLoading ? '⏳' : '🔄'} {isLoading ? '同步中' : '立即同步'}
                            </button>
                            <span className="text-xs text-gray-500">数据源: 腾讯财经</span>
                        </div>
                    </div>

                    {/* 统计卡片 */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <StatCard title="总市值" value={`${totalMarketCap > 0 ? totalMarketCap.toFixed(0) : '-'}亿`} subtitle="实时计算" icon="💰" color="blue" />
                        <StatCard title="平均PE" value={avgPE} subtitle="TTM市盈率" icon="📊" color="purple" />
                        <StatCard title="平均PEG" value={avgPEG} subtitle="增长估值比" icon="⚖️" color="green" />
                        <StatCard title="中期标的" value={2} subtitle="核心持仓(1-3年)" icon="🎯" color="amber" />
                        <StatCard title="短线标的" value={8} subtitle="卫星持仓(6-12月)" icon="⚡" color="blue" />
                        <StatCard title="观察标的" value={1} subtitle="剑桥科技" icon="👁️" color="purple" />
                    </div>

                    {/* 实时行情卡片 */}
                    <div className="glass rounded-xl p-5">
                        <h2 className="text-lg font-semibold text-white mb-4">
                            📈 实时行情监控 {status === 'connected' ? '(腾讯财经)' : '(同步中)'}
                        </h2>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                            {STOCKS_BASE.map(stock => (
                                <RealTimeCard key={stock.code} stock={stock} quote={quotes[stock.code]} onClick={() => onSelectStock(stock.code)} />
                            ))}
                        </div>
                    </div>

                    {/* 标的对比表格 */}
                    <div className="glass rounded-xl p-5">
                        <div className="flex flex-wrap items-center justify-between gap-4 mb-4">
                            <h2 className="text-lg font-semibold text-white">📋 标的池对比分析</h2>
                            <div className="flex flex-wrap gap-2">
                                <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} className="bg-dark-700 text-sm text-gray-300 rounded-lg px-3 py-1.5 border border-gray-700 focus:border-blue-500 outline-none">
                                    <option value="all">全部类别</option>
                                    {categories.filter(c => c !== 'all').map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="bg-dark-700 text-sm text-gray-300 rounded-lg px-3 py-1.5 border border-gray-700 focus:border-blue-500 outline-none">
                                    <option value="marketCap">按市值排序</option>
                                    <option value="pe">按PE排序</option>
                                    <option value="peg">按PEG排序</option>
                                    <option value="roe">按ROE排序</option>
                                    <option value="change">按涨跌幅排序</option>
                                </select>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-gray-400 border-b border-gray-700">
                                        <th className="text-left py-3 px-2">标的</th>
                                        <th className="text-left py-3 px-2">类别</th>
                                        <th className="text-right py-3 px-2">实时价</th>
                                        <th className="text-right py-3 px-2">涨跌</th>
                                        <th className="text-right py-3 px-2">市值(亿)</th>
                                        <th className="text-right py-3 px-2">PE</th>
                                        <th className="text-right py-3 px-2">PEG</th>
                                        <th className="text-right py-3 px-2">ROE</th>
                                        <th className="text-right py-3 px-2">营收(亿)</th>
                                        <th className="text-center py-3 px-2">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredStocks.map(stock => {
                                        const q = quotes[stock.code];
                                        const price = q?.price || 0;
                                        const change = q?.change || 0;
                                        const marketCap = price > 0 ? (price * stock.shares).toFixed(0) : '-';
                                        const isUp = change >= 0;
                                        return (

                                                    <span className={`badge ${getHorizonClass(stock.horizon)}`}>{stock.horizon}</span>
                                                    <div className="text-xs text-gray-500 mt-1">{stock.category}</div>
                                                </td>
                                                <td className={`text-right py-3 px-2 font-bold ${price > 0 ? (isUp ? 'price-up' : 'price-down') : 'text-gray-500'}`}>
                                                    {price > 0 ? `¥${price.toFixed(2)}` : '加载中'}
                                                </td>
                                                <td className={`text-right py-3 px-2 ${price > 0 ? (isUp ? 'price-up' : 'price-down') : 'text-gray-500'}`}>
                                                    {price > 0 ? `${isUp ? '+' : ''}${change.toFixed(2)}%` : '-'}
                                                </td>
                                                <td className="text-right py-3 px-2 font-medium text-white">{marketCap}</td>
                                                <td className={`text-right py-3 px-2 ${stock.pe < 20 ? 'text-emerald-400' : stock.pe < 35 ? 'text-blue-400' : 'text-amber-400'}`}>{stock.pe}</td>
                                                <td className={`text-right py-3 px-2 ${stock.peg < 0.5 ? 'text-emerald-400' : stock.peg < 1 ? 'text-blue-400' : 'text-amber-400'}`}>{stock.peg > 50 ? 'N/A' : stock.peg}</td>
                                                <td className="text-right py-3 px-2 text-blue-400">{stock.roe}%</td>
                                                <td className="text-right py-3 px-2 text-gray-400">{stock.revenue}</td>
                                                <td className="text-center py-3 px-2"><button className="text-blue-400 hover:text-blue-300 text-xs underline">详情</button></td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* 图表区域 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass rounded-xl p-5">
                            <h3 className="text-lg font-semibold text-white mb-4">📊 核心标的估值对比</h3>
                            <ValuationChart stocks={STOCKS_BASE} />
                        </div>
                        <div className="glass rounded-xl p-5">
                            <h3 className="text-lg font-semibold text-white mb-4">🥧 市值分布（实时）</h3>
                            <MarketCapPie stocks={STOCKS_BASE} quotes={quotes} />

                    </div>

                    {/* 策略 */}
                    <div className="glass rounded-xl p-5">
                        <h3 className="text-lg font-semibold text-white mb-4">🎯 投资策略框架</h3>
                        <div className="space-y-3 text-sm">
                            <div className="p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
                                <div className="font-semibold text-emerald-400 mb-1">核心持仓 (30-40%)</div>
                                <div className="text-gray-400">中际旭创、新易盛 — 光模块双龙头，800G/1.6T核心受益，中期持有1-3年</div>
                            </div>
                            <div className="p-3 rounded-lg bg-blue-500/10 border border-blue-500/20">

                            </div>
                            <div className="p-3 rounded-lg bg-amber-500/10 border border-amber-500/20">

                            </div>

        };

        // ==================== 页面：StockDetail ====================
        const StockDetail = ({ stockCode, onBack, quotes }) => {
            const stock = STOCKS_BASE.find(s => s.code === stockCode);
            const [activeTab, setActiveTab] = useState('overview');
            const quote = quotes[stockCode];
            const price = quote?.price || 0;
            const change = quote?.change || 0;
            const isUp = change >= 0;
            const marketCap = price > 0 ? (price * stock.shares).toFixed(0) : '-';
            const upside = price > 0 ? ((stock.target - price) / price * 100).toFixed(1) : '-';

            if (!stock) return null;

            const tabs = [
                { id: 'overview', label: '概览', icon: '📋' },
                { id: 'financial', label: '财务', icon: '💹' },
                { id: 'valuation', label: '估值', icon: '⚖️' },
                { id: 'forecast', label: '预判', icon: '🔮' },
            ];

            return (
                <div className="animate-fade-in space-y-6">
                    <div className="glass rounded-xl p-5">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={onBack} className="text-blue-400 hover:text-blue-300 text-sm flex items-center gap-1">← 返回看板</button>
                            <span className={`badge ${getBadgeClass(stock.position)}`}>{stock.position}</span>
                        </div>
                        <div className="flex flex-wrap items-end gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-white">{stock.name}</h1>
                                <div className="text-gray-400 text-sm">{stock.code} · {stock.category}</div>
                            </div>
                            <div className="ml-auto text-right">
                                <div className={`text-3xl font-bold ${price > 0 ? (isUp ? 'price-up' : 'price-down') : 'text-gray-500'}`}>
                                    {price > 0 ? `¥${price.toFixed(2)}` : '加载中...'}
                                </div>
                                <div className={`text-sm ${price > 0 ? (isUp ? 'price-up' : 'price-down') : 'text-gray-500'}`}>
                                    {price > 0 ? `${isUp ? '+' : ''}${change.toFixed(2)}% ${isUp ? '▲' : '▼'}` : ''}
                                </div>
                                <div className="text-sm text-gray-400">市值 {marketCap}亿 | PE {stock.pe} | 目标 ¥{stock.target}</div>
                            </div>
                        </div>
                    </div>

                    <div className="flex border-b border-gray-700">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-3 text-sm font-medium transition-colors ${activeTab === tab.id ? 'tab-active' : 'text-gray-400 hover:text-gray-300'}`}>
                                {tab.icon} {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-6">
                        {activeTab === 'overview' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">2025营收</div>
                                        <div className="text-xl font-bold text-white">{stock.revenue}亿</div>
                                    </div>
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">2025净利</div>
                                        <div className="text-xl font-bold text-white">{stock.profit}亿</div>
                                    </div>
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">ROE</div>
                                        <div className="text-xl font-bold text-white">{stock.roe}%</div>
                                    </div>
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">毛利率</div>
                                        <div className="text-xl font-bold text-white">{stock.margin}%</div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-emerald-400 mb-3">✅ 核心驱动力</h3>
                                        <div className="space-y-2 text-sm text-gray-400">
                                            <div>• AI算力需求驱动800G/1.6T光模块放量</div>
                                            <div>• 全球数据中心光互连升级周期</div>
                                            <div>• 国产替代加速，份额持续提升</div>
                                            <div>• 硅光/CPO技术领先布局</div>
                                        </div>
                                    </div>
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-red-400 mb-3">⚠️ 风险因素</h3>
                                        <div className="space-y-2 text-sm text-gray-400">
                                            <div>• 下游客户资本开支波动风险</div>
                                            <div>• 技术迭代导致产品替代风险</div>
                                            <div>• 地缘政治/贸易摩擦影响出口</div>
                                            <div>• 行业竞争加剧导致毛利率下滑</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-lg font-semibold text-white mb-3">🎯 组合定位</h3>
                                    <div className="text-sm text-gray-400 space-y-2">
                                        <div><span className="text-blue-400 font-medium">投资期限：</span>{stock.horizon}</div>
                                        <div><span className="text-blue-400 font-medium">仓位建议：</span>{stock.position}</div>
                                        <div><span className="text-blue-400 font-medium">目标价：</span>¥{stock.target}</div>
                                        <div><span className="text-blue-400 font-medium">上涨空间：</span><span className={upside !== '-' && parseFloat(upside) > 0 ? 'text-emerald-400' : 'text-red-400'}>{upside !== '-' ? (parseFloat(upside) > 0 ? '+' : '') + upside + '%' : '-'}</span></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'financial' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-lg font-semibold text-white mb-4">📊 财务数据明细</h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead><tr className="text-gray-400 border-b border-gray-700"><th className="text-left py-2 px-3">指标</th><th className="text-right py-2 px-3">2025年报</th></tr></thead>
                                            <tbody className="text-gray-300">
                                                <tr className="border-b border-gray-800/50"><td className="py-2 px-3">营业收入</td><td className="text-right py-2 px-3 font-medium text-white">{stock.revenue}亿元</td></tr>
                                                <tr className="border-b border-gray-800/50"><td className="py-2 px-3">归母净利润</td><td className="text-right py-2 px-3 font-medium text-white">{stock.profit}亿元</td></tr>
                                                <tr className="border-b border-gray-800/50"><td className="py-2 px-3">ROE</td><td className="text-right py-2 px-3 font-medium text-white">{stock.roe}%</td></tr>
                                                <tr className="border-b border-gray-800/50"><td className="py-2 px-3">毛利率</td><td className="text-right py-2 px-3 font-medium text-white">{stock.margin}%</td></tr>
                                                <tr className="border-b border-gray-800/50"><td className="py-2 px-3">总股本</td><td className="text-right py-2 px-3 font-medium text-white">{stock.shares}亿股</td></tr>
                                                <tr><td className="py-2 px-3">EPS</td><td className="text-right py-2 px-3 font-medium text-white">{(stock.profit / stock.shares).toFixed(2)}元</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'valuation' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-white mb-4">📐 估值指标</h3>
                                        <div className="space-y-3">
                                            <div className="flex justify-between py-2 border-b border-gray-800"><span className="text-gray-400">PE-TTM</span><span className="font-medium text-white">{stock.pe}x</span></div>
                                            <div className="flex justify-between py-2 border-b border-gray-800"><span className="text-gray-400">PEG</span><span className={`font-medium ${stock.peg < 1 ? 'text-emerald-400' : 'text-amber-400'}`}>{stock.peg > 50 ? 'N/A' : stock.peg}</span></div>
                                            <div className="flex justify-between py-2 border-b border-gray-800"><span className="text-gray-400">实时市值</span><span className="font-medium text-white">{marketCap}亿</span></div>
                                            <div className="flex justify-between py-2 border-b border-gray-800"><span className="text-gray-400">目标价</span><span className="font-medium text-white">¥{stock.target}</span></div>
                                            <div className="flex justify-between py-2"><span className="text-gray-400">上涨空间</span><span className={`font-medium ${upside !== '-' && parseFloat(upside) > 0 ? 'text-emerald-400' : 'text-red-400'}`}>{upside !== '-' ? (parseFloat(upside) > 0 ? '+' : '') + upside + '%' : '-'}</span></div>
                                        </div>
                                    </div>
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-white mb-4">🎯 估值判断</h3>
                                        <div className={`p-4 rounded-lg border ${stock.pe < 20 ? 'bg-emerald-500/10 border-emerald-500/20' : stock.pe < 35 ? 'bg-blue-500/10 border-blue-500/20' : 'bg-amber-500/10 border-amber-500/20'}`}>
                                            <div className={`font-bold mb-2 ${stock.pe < 20 ? 'text-emerald-400' : stock.pe < 35 ? 'text-blue-400' : 'text-amber-400'}`}>
                                                {stock.pe < 20 ? '估值偏低' : stock.pe < 35 ? '估值合理' : '估值偏高'}
                                            </div>
                                            <div className="text-sm text-gray-400">
                                                {stock.pe < 20 ? 'PE低于行业平均，PEG<1，具备安全边际' : stock.pe < 35 ? 'PE处于合理区间，匹配成长性' : 'PE较高，需业绩持续高增长支撑'}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'forecast' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-emerald-400 mb-3">🟢 机会分析</h3>
                                        <div className="space-y-2 text-sm text-gray-400">
                                            <div>• 2026年800G光模块需求预计翻倍</div>
                                            <div>• 北美云厂商资本开支2026年预计增长20%+</div>
                                            <div>• 硅光技术渗透率提升，成本持续下降</div>
                                            <div>• 国产算力建设加速，国内需求增量可观</div>
                                        </div>
                                    </div>
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-red-400 mb-3">🔴 风险预警</h3>
                                        <div className="space-y-2 text-sm text-gray-400">
                                            <div>• 1.6T产品良率和成本控制存在不确定性</div>
                                            <div>• 特朗普关税政策可能影响对美出口</div>
                                            <div>• 行业扩产过快可能导致价格战</div>
                                            <div>• 光芯片国产化进度慢于预期</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-lg font-semibold text-white mb-3">📅 定期追踪计划</h3>
                                    <div className="space-y-3 text-sm">
                                        <div className="flex items-center gap-3 p-3 rounded-lg bg-dark-700/50"><span className="text-blue-400 font-medium w-16">每周</span><span className="text-gray-400">股价异动监控、资金流向跟踪</span></div>
                                        <div className="flex items-center gap-3 p-3 rounded-lg bg-dark-700/50"><span className="text-purple-400 font-medium w-16">每月</span><span className="text-gray-400">估值模型重算、机构评级跟踪</span></div>
                                        <div className="flex items-center gap-3 p-3 rounded-lg bg-dark-700/50"><span className="text-emerald-400 font-medium w-16">每季</span><span className="text-gray-400">财报深度分析、业绩预测修正</span></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== 主应用 ====================
        const App = () => {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [selectedStock, setSelectedStock] = useState(null);
            const [quotes, setQuotes] = useState({});
            const [lastUpdate, setLastUpdate] = useState('-');
            const [status, setStatus] = useState('idle');
            const [isLoading, setIsLoading] = useState(false);
            const intervalRef = useRef(null);

            // 获取腾讯财经行情
            const fetchTencentQuotes = useCallback(async () => {
                setIsLoading(true);
                setStatus('loading');

                try {
                    const quotes = await fetchTencentQuotes();
                    if (Object.keys(quotes).length > 0) {
                        setQuotes(quotes);
                        setLastUpdate(new Date().toLocaleTimeString('zh-CN'));
                        setStatus('connected');
                    } else {
                        throw new Error('No data received');
                    }
                } catch (error) {
                    console.error('获取行情失败:', error);
                    setStatus('error');
                    setLastUpdate(new Date().toLocaleTimeString('zh-CN') + ' (失败)');
                } finally {
                    setIsLoading(false);
                }
            }, []);

            // 初始加载 + 定时刷新
            useEffect(() => {
                fetchTencentQuotes();
                intervalRef.current = setInterval(fetchTencentQuotes, 30000);
                return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
            }, [fetchTencentQuotes]);

            const handleSelectStock = (code) => {
                setSelectedStock(code);
                setCurrentPage('detail');
            };

            const handleBack = () => {
                setCurrentPage('dashboard');
                setSelectedStock(null);
            };

            return (
                <div className="min-h-screen bg-dark-900">
                    <header className="sticky top-0 z-50 glass border-b border-gray-800/50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">AI</div>
                                <div>
                                    <h1 className="text-lg font-bold text-white">AI光模块产业链投资看板</h1>
                                    <div className="text-xs text-gray-500">实时行情版 | 数据源: 腾讯财经</div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className={`live-dot ${status === 'connected' ? 'active' : ''}`}></span>
                                <span className="text-xs text-gray-500">{status === 'connected' ? '实时' : status === 'loading' ? '同步中' : '等待'}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {currentPage === 'dashboard' && (
                            <Dashboard 
                                onSelectStock={handleSelectStock} 
                                quotes={quotes} 
                                lastUpdate={lastUpdate} 
                                status={status}
                                onRefresh={fetchTencentQuotes} 
                                isLoading={isLoading}
                            />
                        )}
                        {currentPage === 'detail' && <StockDetail stockCode={selectedStock} onBack={handleBack} quotes={quotes} />}
                    </main>

                    <footer className="border-t border-gray-800/50 mt-12 py-6">
                        <div className="max-w-7xl mx-auto px-4 text-center text-xs text-gray-600">
                            <div>AI光模块产业链投资看板 | 基于腾讯财经 JSONP 获取真实实时行情 | 仅供参考，不构成投资建议</div>
                            <div className="mt-1">
                                {status === 'connected' 
                                    ? '✅ 已连接腾讯财经 | 每30秒自动同步 | 数据延迟约15-60秒' 
                                    : '⏳ 正在初始化数据连接...'}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
