<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI光模块产业链投资看板</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #e5e7eb; margin: 0; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(59, 130, 246, 0.15); }
        .price-up { color: #ff4d4f; }
        .price-down { color: #10b981; }
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-core { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-satellite { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .badge-watch { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; }
        .live-dot.active { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const STOCKS = [
            { code: "300308.SZ", name: "中际旭创", category: "光模块龙头", position: "核心持仓", tencent: "sz300308", pe: 18.5, peg: 0.17, roe: 36.3, revenue: 382.40, profit: 107.97, shares: 11.11 },
            { code: "300502.SZ", name: "新易盛", category: "光模块", position: "核心持仓", tencent: "sz300502", pe: 16.2, peg: 0.07, roe: 53.0, revenue: 248.42, profit: 95.32, shares: 7.10 },
            { code: "300394.SZ", name: "天孚通信", category: "光器件/光引擎", position: "卫星持仓", tencent: "sz300394", pe: 22.0, peg: 0.44, roe: 41.9, revenue: 51.63, profit: 20.17, shares: 0.78 },
            { code: "688498.SH", name: "源杰科技", category: "光芯片", position: "卫星持仓", tencent: "sh688498", pe: 85.0, peg: 99.99, roe: 8.68, revenue: 6.01, profit: 1.91, shares: 0.85 },
            { code: "300476.SZ", name: "胜宏科技", category: "PCB", position: "卫星持仓", tencent: "sz300476", pe: 14.5, peg: 0.05, roe: 35.56, revenue: 192.92, profit: 43.12, shares: 8.70 },
            { code: "002463.SZ", name: "沪电股份", category: "PCB", position: "卫星持仓", tencent: "sz002463", pe: 18.0, peg: 0.38, roe: 28.57, revenue: 189.45, profit: 38.22, shares: 19.24 },
            { code: "688313.SH", name: "仕佳光子", category: "光芯片", position: "卫星持仓", tencent: "sh688313", pe: 35.0, peg: 0.07, roe: 27.10, revenue: 21.29, profit: 3.72, shares: 4.59 },
            { code: "000988.SZ", name: "华工科技", category: "光模块", position: "卫星持仓", tencent: "sz000988", pe: 28.0, peg: 1.37, roe: 13.97, revenue: 143.55, profit: 14.71, shares: 10.06 },
            { code: "002281.SZ", name: "光迅科技", category: "光模块", position: "卫星持仓", tencent: "sz002281", pe: 32.0, peg: 0.74, roe: 9.88, revenue: 119.29, profit: 9.46, shares: 8.07 },
            { code: "603083.SH", name: "剑桥科技", category: "光模块", position: "观察持仓", tencent: "sh603083", pe: 55.0, peg: 0.96, roe: 4.5, revenue: 48.23, profit: 2.63, shares: 3.53 },
        ];

        // 腾讯财经 JSONP 获取
        function loadTencentData() {
            return new Promise((resolve, reject) => {
                const codes = STOCKS.map(s => s.tencent).join(",");
                const script = document.createElement('script');
                script.src = `https://qt.gtimg.cn/q=${codes}`;
                script.charset = 'gb2312';

                const timeout = setTimeout(() => {
                    reject(new Error('Timeout'));
                    cleanup();
                }, 15000);

                const cleanup = () => {
                    clearTimeout(timeout);
                    if (script.parentNode) script.parentNode.removeChild(script);
                };

                script.onload = () => {
                    try {
                        const quotes = {};
                        STOCKS.forEach(stock => {
                            const data = window[`v_${stock.tencent}`];
                            if (data) {
                                const parts = data.split('~');
                                if (parts.length > 3) {
                                    quotes[stock.code] = {
                                        price: parseFloat(parts[3]) || 0,
                                        change: parseFloat(parts[32]) || 0,
                                        volume: parseInt(parts[6]) || 0,
                                        high: parseFloat(parts[33]) || 0,
                                        low: parseFloat(parts[34]) || 0,
                                        name: parts[1]
                                    };
                                }
                            }
                        });
                        resolve(quotes);
                    } catch (e) {
                        reject(e);
                    } finally {
                        cleanup();
                    }
                };

                script.onerror = () => {
                    reject(new Error('Load failed'));
                    cleanup();
                };

                document.head.appendChild(script);
            });
        }

        function App() {
            const [quotes, setQuotes] = useState({});
            const [status, setStatus] = useState('loading');
            const [lastUpdate, setLastUpdate] = useState('-');
            const [loading, setLoading] = useState(false);

            const fetchData = useCallback(async () => {
                setLoading(true);
                setStatus('loading');
                try {
                    const data = await loadTencentData();
                    setQuotes(data);
                    setStatus('connected');
                    setLastUpdate(new Date().toLocaleTimeString('zh-CN'));
                } catch (e) {
                    console.error(e);
                    setStatus('error');
                    setLastUpdate(new Date().toLocaleTimeString('zh-CN') + ' (失败)');
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, [fetchData]);

            const totalCap = Object.keys(quotes).length > 0 
                ? STOCKS.reduce((sum, s) => sum + (quotes[s.code]?.price || 0) * s.shares, 0).toFixed(0)
                : '-';

            const avgPE = (STOCKS.reduce((sum, s) => sum + s.pe, 0) / STOCKS.length).toFixed(1);
            const avgPEG = (STOCKS.filter(s => s.peg < 50).reduce((sum, s) => sum + s.peg, 0) / STOCKS.filter(s => s.peg < 50).length).toFixed(2);

            return (
                <div style={{ minHeight: '100vh', background: '#0a0e1a' }}>
                    {/* Header */}
                    <header className="glass" style={{ position: 'sticky', top: 0, zIndex: 50, borderBottom: '1px solid rgba(255,255,255,0.08)', padding: '16px 0' }}>
                        <div style={{ maxWidth: '1280px', margin: '0 auto', padding: '0 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <div style={{ width: '32px', height: '32px', borderRadius: '8px', background: 'linear-gradient(135deg, #3b82f6, #6366f1)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontWeight: 'bold' }}>AI</div>
                                <div>
                                    <h1 style={{ fontSize: '18px', fontWeight: 'bold', color: 'white', margin: 0 }}>AI光模块产业链投资看板</h1>
                                    <div style={{ fontSize: '12px', color: '#6b7280' }}>实时行情版 | 数据源: 腾讯财经</div>
                                </div>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                <span className={`live-dot ${status === 'connected' ? 'active' : ''}`}></span>
                                <span style={{ fontSize: '12px', color: '#6b7280' }}>{status === 'connected' ? '实时' : status === 'loading' ? '同步中' : '等待'}</span>
                            </div>
                        </div>
                    </header>

                    <main style={{ maxWidth: '1280px', margin: '0 auto', padding: '24px 16px' }}>
                        {/* Status Bar */}
                        <div className="glass" style={{ borderRadius: '12px', padding: '16px', marginBottom: '24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '12px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <span className={`live-dot ${status === 'connected' ? 'active' : ''}`}></span>
                                <span style={{ fontSize: '14px', fontWeight: 500, color: status === 'connected' ? '#10b981' : status === 'error' ? '#ef4444' : '#f59e0b' }}>
                                    {loading ? '⏳ 同步中...' : status === 'connected' ? '✅ 已连接腾讯财经' : status === 'error' ? '❌ 连接失败' : '⚪ 等待连接'}
                                </span>
                                <span style={{ fontSize: '12px', color: '#6b7280' }}>| 最后更新: {lastUpdate}</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <button className="btn" onClick={fetchData} disabled={loading}>
                                    {loading ? '⏳' : '🔄'} {loading ? '同步中' : '立即同步'}
                                </button>
                                <span style={{ fontSize: '12px', color: '#6b7280' }}>数据源: 腾讯财经</span>
                            </div>
                        </div>

                        {/* Stats */}
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '16px', marginBottom: '24px' }}>
                            <div className="glass card-hover" style={{ borderRadius: '12px', padding: '20px', border: '1px solid rgba(59, 130, 246, 0.2)', background: 'linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(99, 102, 241, 0.1))' }}>
                                <div style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '8px' }}>总市值</div>
                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'white' }}>{totalCap}亿</div>
                                <div style={{ fontSize: '12px', color: '#6b7280' }}>实时计算</div>
                            </div>
                            <div className="glass card-hover" style={{ borderRadius: '12px', padding: '20px', border: '1px solid rgba(139, 92, 246, 0.2)', background: 'linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1))' }}>
                                <div style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '8px' }}>平均PE</div>
                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'white' }}>{avgPE}</div>
                                <div style={{ fontSize: '12px', color: '#6b7280' }}>TTM市盈率</div>
                            </div>
                            <div className="glass card-hover" style={{ borderRadius: '12px', padding: '20px', border: '1px solid rgba(16, 185, 129, 0.2)', background: 'linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(20, 184, 166, 0.1))' }}>
                                <div style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '8px' }}>平均PEG</div>
                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'white' }}>{avgPEG}</div>
                                <div style={{ fontSize: '12px', color: '#6b7280' }}>增长估值比</div>
                            </div>
                            <div className="glass card-hover" style={{ borderRadius: '12px', padding: '20px', border: '1px solid rgba(245, 158, 11, 0.2)', background: 'linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(249, 115, 22, 0.1))' }}>
                                <div style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '8px' }}>中期标的</div>
                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'white' }}>2</div>
                                <div style={{ fontSize: '12px', color: '#6b7280' }}>核心持仓(1-3年)</div>
                            </div>
                            <div className="glass card-hover" style={{ borderRadius: '12px', padding: '20px', border: '1px solid rgba(59, 130, 246, 0.2)', background: 'linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(14, 165, 233, 0.1))' }}>
                                <div style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '8px' }}>短线标的</div>
                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'white' }}>8</div>
                                <div style={{ fontSize: '12px', color: '#6b7280' }}>卫星持仓(6-12月)</div>
                            </div>
                            <div className="glass card-hover" style={{ borderRadius: '12px', padding: '20px', border: '1px solid rgba(139, 92, 246, 0.2)', background: 'linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(168, 85, 247, 0.1))' }}>
                                <div style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '8px' }}>观察标的</div>
                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'white' }}>1</div>
                                <div style={{ fontSize: '12px', color: '#6b7280' }}>剑桥科技</div>
                            </div>
                        </div>

                        {/* Real-time Cards */}
                        <div className="glass" style={{ borderRadius: '12px', padding: '20px', marginBottom: '24px' }}>
                            <h2 style={{ fontSize: '18px', fontWeight: '600', color: 'white', marginBottom: '16px' }}>
                                📈 实时行情监控 {status === 'connected' ? '(腾讯财经)' : '(同步中)'}
                            </h2>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '16px' }}>
                                {STOCKS.map(stock => {
                                    const q = quotes[stock.code];
                                    const price = q?.price || 0;
                                    const change = q?.change || 0;
                                    const isUp = change >= 0;
                                    const marketCap = price > 0 ? (price * stock.shares).toFixed(0) : '-';

                                    return (
                                        <div key={stock.code} className="glass card-hover" style={{ borderRadius: '12px', padding: '16px', cursor: 'pointer' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
                                                <div>
                                                    <div style={{ fontWeight: 'bold', color: 'white' }}>{stock.name}</div>
                                                    <div style={{ fontSize: '12px', color: '#6b7280' }}>{stock.code}</div>
                                                </div>
                                                <span className={`badge ${stock.position === '核心持仓' ? 'badge-core' : stock.position === '卫星持仓' ? 'badge-satellite' : 'badge-watch'}`}>
                                                    {stock.position}
                                                </span>
                                            </div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                                                <div>
                                                    <div style={{ fontSize: '24px', fontWeight: 'bold', color: price > 0 ? (isUp ? '#ff4d4f' : '#10b981') : '#6b7280' }}>
                                                        {price > 0 ? `¥${price.toFixed(2)}` : '加载中...'}
                                                    </div>
                                                    <div style={{ fontSize: '14px', color: price > 0 ? (isUp ? '#ff4d4f' : '#10b981') : '#6b7280' }}>
                                                        {price > 0 ? `${isUp ? '+' : ''}${change.toFixed(2)}%` : ''}
                                                    </div>
                                                </div>
                                                <div style={{ textAlign: 'right' }}>
                                                    <div style={{ fontSize: '12px', color: '#6b7280' }}>市值</div>
                                                    <div style={{ fontSize: '14px', color: 'white' }}>{marketCap !== '-' ? `${marketCap}亿` : '-'}</div>
                                                </div>
                                            </div>
                                            <div style={{ marginTop: '12px', display: 'flex', gap: '8px', fontSize: '12px', color: '#6b7280' }}>
                                                <span>PE: {stock.pe}</span>
                                                <span>|</span>
                                                <span>PEG: {stock.peg > 50 ? 'N/A' : stock.peg}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Table */}
                        <div className="glass" style={{ borderRadius: '12px', padding: '20px', marginBottom: '24px' }}>
                            <h2 style={{ fontSize: '18px', fontWeight: '600', color: 'white', marginBottom: '16px' }}>📋 标的池对比分析</h2>
                            <div style={{ overflowX: 'auto' }}>
                                <table style={{ width: '100%', fontSize: '14px', borderCollapse: 'collapse' }}>
                                    <thead>
                                        <tr style={{ color: '#9ca3af', borderBottom: '1px solid #374151' }}>
                                            <th style={{ textAlign: 'left', padding: '12px 8px' }}>标的</th>
                                            <th style={{ textAlign: 'left', padding: '12px 8px' }}>类别</th>
                                            <th style={{ textAlign: 'right', padding: '12px 8px' }}>实时价</th>
                                            <th style={{ textAlign: 'right', padding: '12px 8px' }}>涨跌</th>
                                            <th style={{ textAlign: 'right', padding: '12px 8px' }}>市值(亿)</th>
                                            <th style={{ textAlign: 'right', padding: '12px 8px' }}>PE</th>
                                            <th style={{ textAlign: 'right', padding: '12px 8px' }}>PEG</th>
                                            <th style={{ textAlign: 'right', padding: '12px 8px' }}>ROE</th>
                                            <th style={{ textAlign: 'right', padding: '12px 8px' }}>营收(亿)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {STOCKS.map(stock => {
                                            const q = quotes[stock.code];
                                            const price = q?.price || 0;
                                            const change = q?.change || 0;
                                            const isUp = change >= 0;
                                            const marketCap = price > 0 ? (price * stock.shares).toFixed(0) : '-';

                                            return (
                                                <tr key={stock.code} style={{ borderBottom: '1px solid rgba(55, 65, 81, 0.5)', cursor: 'pointer' }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(59, 130, 246, 0.08)'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                                                    <td style={{ padding: '12px 8px' }}>
                                                        <div style={{ fontWeight: 500, color: 'white' }}>{stock.name}</div>
                                                        <div style={{ fontSize: '12px', color: '#6b7280' }}>{stock.code}</div>
                                                    </td>
                                                    <td style={{ padding: '12px 8px' }}>
                                                        <div style={{ fontSize: '12px', color: '#6b7280' }}>{stock.category}</div>
                                                    </td>
                                                    <td style={{ textAlign: 'right', padding: '12px 8px', fontWeight: 'bold', color: price > 0 ? (isUp ? '#ff4d4f' : '#10b981') : '#6b7280' }}>
                                                        {price > 0 ? `¥${price.toFixed(2)}` : '加载中'}
                                                    </td>
                                                    <td style={{ textAlign: 'right', padding: '12px 8px', color: price > 0 ? (isUp ? '#ff4d4f' : '#10b981') : '#6b7280' }}>
                                                        {price > 0 ? `${isUp ? '+' : ''}${change.toFixed(2)}%` : '-'}
                                                    </td>
                                                    <td style={{ textAlign: 'right', padding: '12px 8px', color: 'white' }}>{marketCap}</td>
                                                    <td style={{ textAlign: 'right', padding: '12px 8px', color: stock.pe < 20 ? '#10b981' : stock.pe < 35 ? '#60a5fa' : '#f59e0b' }}>{stock.pe}</td>
                                                    <td style={{ textAlign: 'right', padding: '12px 8px', color: stock.peg < 0.5 ? '#10b981' : stock.peg < 1 ? '#60a5fa' : '#f59e0b' }}>{stock.peg > 50 ? 'N/A' : stock.peg}</td>
                                                    <td style={{ textAlign: 'right', padding: '12px 8px', color: '#60a5fa' }}>{stock.roe}%</td>
                                                    <td style={{ textAlign: 'right', padding: '12px 8px', color: '#9ca3af' }}>{stock.revenue}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Strategy */}
                        <div className="glass" style={{ borderRadius: '12px', padding: '20px' }}>
                            <h2 style={{ fontSize: '18px', fontWeight: '600', color: 'white', marginBottom: '16px' }}>🎯 投资策略框架</h2>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '16px' }}>
                                <div style={{ padding: '16px', borderRadius: '8px', background: 'rgba(16, 185, 129, 0.1)', border: '1px solid rgba(16, 185, 129, 0.2)' }}>
                                    <div style={{ fontWeight: '600', color: '#10b981', marginBottom: '8px' }}>核心持仓 (30-40%)</div>
                                    <div style={{ fontSize: '14px', color: '#9ca3af' }}>中际旭创、新易盛 — 光模块双龙头，800G/1.6T核心受益，中期持有1-3年</div>
                                </div>
                                <div style={{ padding: '16px', borderRadius: '8px', background: 'rgba(59, 130, 246, 0.1)', border: '1px solid rgba(59, 130, 246, 0.2)' }}>
                                    <div style={{ fontWeight: '600', color: '#60a5fa', marginBottom: '8px' }}>卫星持仓 (40-50%)</div>
                                    <div style={{ fontSize: '14px', color: '#9ca3af' }}>天孚通信、源杰科技、胜宏科技、沪电股份、仕佳光子、华工科技、光迅科技</div>
                                </div>
                                <div style={{ padding: '16px', borderRadius: '8px', background: 'rgba(245, 158, 11, 0.1)', border: '1px solid rgba(245, 158, 11, 0.2)' }}>
                                    <div style={{ fontWeight: '600', color: '#f59e0b', marginBottom: '8px' }}>观察持仓 (5-10%)</div>
                                    <div style={{ fontSize: '14px', color: '#9ca3af' }}>剑桥科技 — 高速光模块新秀，跟踪技术迭代</div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer style={{ borderTop: '1px solid rgba(255,255,255,0.08)', marginTop: '48px', padding: '24px 0' }}>
                        <div style={{ maxWidth: '1280px', margin: '0 auto', padding: '0 16px', textAlign: 'center', fontSize: '12px', color: '#6b7280' }}>
