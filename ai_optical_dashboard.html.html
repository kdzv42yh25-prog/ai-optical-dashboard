        // ==================== 工具函数 ====================
        const formatNumber = (n, d = 1) => n ? n.toFixed(d) : '-';
        const formatBillion = (n) => n >= 100 ? `${(n/100).toFixed(2)}亿` : `${n.toFixed(1)}亿`;
        const getBadgeClass = (type) => {
            if (type === '核心持仓') return 'badge-core';
            if (type === '卫星持仓') return 'badge-satellite';
            return 'badge-watch';
        };
        const getHorizonClass = (h) => {
            if (h.includes('中期')) return 'badge-mid';
            return 'badge-short';
        };

        // ==================== 组件：统计卡片 ====================
        const StatCard = ({ title, value, subtitle, icon, color = 'blue' }) => {
            const colorMap = {
                blue: 'from-blue-500/20 to-indigo-500/20 border-blue-500/30',
                green: 'from-emerald-500/20 to-teal-500/20 border-emerald-500/30',
                purple: 'from-purple-500/20 to-pink-500/20 border-purple-500/30',
                amber: 'from-amber-500/20 to-orange-500/20 border-amber-500/30',
            };
            return (
                <div className={`glass rounded-xl p-5 card-hover bg-gradient-to-br ${colorMap[color]} border`}>
                    <div className="flex items-center justify-between mb-3">
                        <span className="text-gray-400 text-sm">{title}</span>
                        <span className="text-2xl">{icon}</span>
                    </div>
                    <div className="text-2xl font-bold text-white mb-1">{value}</div>
                    <div className="text-xs text-gray-500">{subtitle}</div>
                </div>
            );
        };

        // ==================== 组件：图表包装器 ====================
        const ChartCanvas = ({ id, type, data, options }) => {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = canvasRef.current.getContext('2d');
                    chartRef.current = new Chart(ctx, { type, data, options });
                }
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data, options, type]);

            return <canvas ref={canvasRef} id={id} />;
        };

        // ==================== 组件：股价走势图 ====================
        const PriceChart = ({ stockCode, height = 300 }) => {
            const history = PRICE_HISTORY[stockCode] || [];
            const stock = STOCKS.find(s => s.code === stockCode);

            const data = {
                labels: history.map(h => h.date.slice(5)),
                datasets: [{
                    label: stock?.name || stockCode,
                    data: history.map(h => h.price),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 2,
                }]
            };

            const options = {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)',
                        titleColor: '#e5e7eb',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        callbacks: { label: (ctx) => `¥${ctx.parsed.y.toFixed(2)}` }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false, color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#6b7280', maxTicksLimit: 8, font: { size: 10 } }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#6b7280', font: { size: 10 }, callback: v => `¥${v}` }
                    }
                }
            };

            return (
                <div style={{ height }}>
                    <ChartCanvas id={`price-${stockCode}`} type="line" data={data} options={options} />
                </div>
            );
        };

        // ==================== 组件：市场规模图 ====================
        const MarketSizeChart = () => {

                    }
                ]
            };
            const options = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#9ca3af', font: { size: 11 } } },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)',
                        titleColor: '#e5e7eb',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 45 } },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#6b7280', font: { size: 10 } },
                        title: { display: true, text: 'PE', color: '#6b7280', font: { size: 10 } }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        grid: { display: false },
                        ticks: { color: '#6b7280', font: { size: 10 } },
                        title: { display: true, text: 'PEG', color: '#6b7280', font: { size: 10 } }
                    }
                }
            };
            return (
                <div style={{ height: 300 }}>
                    <ChartCanvas id="valuation" type="bar" data={data} options={options} />
                </div>
            );
        };

        // ==================== 组件：市值分布饼图 ====================
        const MarketCapPie = () => {
            const data = {
                labels: STOCKS.map(s => s.name),
                datasets: [{
                    data: STOCKS.map(s => s.market_cap),
                    backgroundColor: [
                        '#3b82f6', '#6366f1', '#8b5cf6', '#a78bfa',
                        '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9',
                        '#f59e0b', '#ef4444'
                    ],
                    borderColor: '#0a0e1a',
                    borderWidth: 2,
                }]
            };
            const options = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { color: '#9ca3af', font: { size: 10 }, boxWidth: 12, padding: 8 }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)',
                        titleColor: '#e5e7eb',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        callbacks: {
                            label: (ctx) => {
                                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                return `${ctx.label}: ${ctx.parsed}亿 (${pct}%)`;
                            }
                        }
                    }
                }
            };
            return (
                <div style={{ height: 300 }}>
                    <ChartCanvas id="marketcap-pie" type="doughnut" data={data} options={options} />
                </div>
            );
        };

        // ==================== 组件：财务柱状图 ====================
        const FinancialChart = ({ stock, metric }) => {
            const years = ['2023', '2024', '2025', '2026E'];
            const values = metric === 'revenue' 
                ? [stock.revenue_2023, stock.revenue_2024, stock.revenue_2025, stock.revenue_2026e]
                : [stock.net_profit_2023, stock.net_profit_2024, stock.net_profit_2025, stock.net_profit_2026e];

            const data = {
                labels: years,
                datasets: [{
                    label: metric === 'revenue' ? '营业收入(亿元)' : '归母净利润(亿元)',
                    data: values,
                    backgroundColor: metric === 'revenue' ? 'rgba(59, 130, 246, 0.7)' : 'rgba(16, 185, 129, 0.7)',
                    borderColor: metric === 'revenue' ? '#3b82f6' : '#10b981',
                    borderWidth: 1,
                    borderRadius: 4,
                }]
            };
            const options = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)',
                        titleColor: '#e5e7eb',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        callbacks: { label: (ctx) => `${ctx.parsed.y}亿元` }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 11 } } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font: { size: 10 } } }
                }
            };
            return (
                <div style={{ height: 220 }}>
                    <ChartCanvas id={`fin-${stock.code}-${metric}`} type="bar" data={data} options={options} />
                </div>
            );
        };

        // ==================== 组件：DCF估值图 ====================
        const DCFChart = ({ stock }) => {
            const data = {
                labels: ['当前股价', 'DCF悲观', 'DCF基准', 'DCF乐观', '机构目标价'],
                datasets: [{
                    label: '价格(元)',
                    data: [stock.price, stock.dcf_pessimistic, stock.dcf_base, stock.dcf_optimistic, stock.target_price],
                    backgroundColor: [
                        'rgba(107, 114, 128, 0.7)',
                        'rgba(239, 68, 68, 0.7)',
                        'rgba(59, 130, 246, 0.7)',
                        'rgba(16, 185, 129, 0.7)',
                        'rgba(139, 92, 246, 0.7)',
                    ],
                    borderColor: ['#6b7280', '#ef4444', '#3b82f6', '#10b981', '#8b5cf6'],
                    borderWidth: 1,
                    borderRadius: 4,
                }]
            };
            const options = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)',
                        titleColor: '#e5e7eb',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        callbacks: { label: (ctx) => `¥${ctx.parsed.y}` }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 10 } } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font: { size: 10 } } }
                }
            };
            return (
                <div style={{ height: 250 }}>
                    <ChartCanvas id={`dcf-${stock.code}`} type="bar" data={data} options={options} />
                </div>
            );
        };

        // ==================== 页面：Dashboard ====================
        const Dashboard = ({ onSelectStock }) => {
            const [sortBy, setSortBy] = useState('market_cap');
            const [filterCategory, setFilterCategory] = useState('all');
            const [selectedPriceStock, setSelectedPriceStock] = useState('300308.SZ');

            const filteredStocks = useMemo(() => {
                let result = [...STOCKS];
                if (filterCategory !== 'all') {
                    result = result.filter(s => s.category === filterCategory || 
                        (filterCategory === '光模块' && s.category.includes('光模块')));
                }
                return result.sort((a, b) => {
                    if (sortBy === 'market_cap') return b.market_cap - a.market_cap;
                    if (sortBy === 'pe') return a.pe_ttm - b.pe_ttm;
                    if (sortBy === 'peg') return a.peg - b.peg;
                    if (sortBy === 'roe') return b.roe_2025 - a.roe_2025;
                    if (sortBy === 'growth') return b.profit_growth_yoy - a.profit_growth_yoy;
                    return 0;
                });
            }, [sortBy, filterCategory]);

            const categories = ['all', '光模块龙头', '光模块', '光器件/光引擎', '光芯片', 'PCB'];

            return (
                <div className="animate-fade-in space-y-6">
                    {/* 统计卡片 */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <StatCard title="总市值" value={`${SUMMARY.total_market_cap}亿`} subtitle="10只标的合计" icon="💰" color="blue" />
                        <StatCard title="平均PE" value={SUMMARY.avg_pe} subtitle="TTM市盈率" icon="📊" color="purple" />
                        <StatCard title="平均PEG" value={SUMMARY.avg_peg} subtitle="增长估值比" icon="⚖️" color="green" />
                        <StatCard title="中期标的" value={SUMMARY.mid_term_count} subtitle="核心持仓(1-3年)" icon="🎯" color="amber" />
                        <StatCard title="短线标的" value={SUMMARY.short_term_count} subtitle="卫星持仓(6-12月)" icon="⚡" color="blue" />
                        <StatCard title="观察标的" value={1} subtitle="剑桥科技" icon="👁️" color="purple" />
                    </div>

                    {/* 标的对比表格 */}
                    <div className="glass rounded-xl p-5">
                        <div className="flex flex-wrap items-center justify-between gap-4 mb-4">
                            <h2 className="text-lg font-semibold text-white">📋 标的池对比分析</h2>
                            <div className="flex flex-wrap gap-2">
                                <select 
                                    value={filterCategory} 
                                    onChange={e => setFilterCategory(e.target.value)}
                                    className="bg-dark-700 text-sm text-gray-300 rounded-lg px-3 py-1.5 border border-gray-700 focus:border-blue-500 outline-none"
                                >
                                    <option value="all">全部类别</option>
                                    {categories.filter(c => c !== 'all').map(c => (
                                        <option key={c} value={c}>{c}</option>
                                    ))}
                                </select>
                                <select 
                                    value={sortBy} 
                                    onChange={e => setSortBy(e.target.value)}
                                    className="bg-dark-700 text-sm text-gray-300 rounded-lg px-3 py-1.5 border border-gray-700 focus:border-blue-500 outline-none"
                                >
                                    <option value="market_cap">按市值排序</option>
                                    <option value="pe">按PE排序</option>
                                    <option value="peg">按PEG排序</option>
                                    <option value="roe">按ROE排序</option>
                                    <option value="growth">按净利增速排序</option>
                                </select>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-gray-400 border-b border-gray-700">
                                        <th className="text-left py-3 px-2">标的</th>
                                        <th className="text-left py-3 px-2">类别</th>
                                        <th className="text-right py-3 px-2">市值(亿)</th>
                                        <th className="text-right py-3 px-2">PE</th>
                                        <th className="text-right py-3 px-2">PEG</th>
                                        <th className="text-right py-3 px-2">ROE</th>
                                        <th className="text-right py-3 px-2">净利增速</th>
                                        <th className="text-right py-3 px-2">营收(亿)</th>
                                        <th className="text-center py-3 px-2">评级</th>
                                        <th className="text-center py-3 px-2">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredStocks.map(stock => (
                                        <tr key={stock.code} className="stock-row border-b border-gray-800/50 cursor-pointer" onClick={() => onSelectStock(stock.code)}>
                                            <td className="py-3 px-2">
                                                <div className="font-medium text-white">{stock.name}</div>
                                                <div className="text-xs text-gray-500">{stock.code}</div>
                                            </td>
                                            <td className="py-3 px-2">
                                                <span className={`badge ${getHorizonClass(stock.investment_horizon)}`}>{stock.investment_horizon}</span>
                                                <div className="text-xs text-gray-500 mt-1">{stock.category}</div>
                                            </td>
                                            <td className="text-right py-3 px-2 font-medium text-white">{stock.market_cap}</td>
                                            <td className={`text-right py-3 px-2 ${stock.pe_ttm < 20 ? 'text-emerald-400' : stock.pe_ttm < 35 ? 'text-blue-400' : 'text-amber-400'}`}>{stock.pe_ttm}</td>
                                            <td className={`text-right py-3 px-2 ${stock.peg < 0.5 ? 'text-emerald-400' : stock.peg < 1 ? 'text-blue-400' : 'text-amber-400'}`}>{stock.peg > 50 ? 'N/A' : stock.peg}</td>
                                            <td className="text-right py-3 px-2 text-blue-400">{stock.roe_2025}%</td>
                                            <td className={`text-right py-3 px-2 ${stock.profit_growth_yoy > 100 ? 'text-emerald-400' : 'text-blue-400'}`}>
                                                {stock.profit_growth_yoy > 900 ? '扭亏' : `${stock.profit_growth_yoy}%`}
                                            </td>
                                            <td className="text-right py-3 px-2 text-gray-400">{stock.revenue_2025}</td>
                                            <td className="text-center py-3 px-2">
                                                <span className={`badge ${stock.rating === '买入' ? 'badge-core' : stock.rating === '增持' ? 'badge-satellite' : 'badge-watch'}`}>{stock.rating}</span>
                                            </td>
                                            <td className="text-center py-3 px-2">
                                                <button className="text-blue-400 hover:text-blue-300 text-xs underline">详情</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* 图表区域 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* 股价走势 */}
                        <div className="glass rounded-xl p-5">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-lg font-semibold text-white">📈 实时股价走势</h3>
                                <select 
                                    value={selectedPriceStock} 
                                    onChange={e => setSelectedPriceStock(e.target.value)}
                                    className="bg-dark-700 text-sm text-gray-300 rounded-lg px-3 py-1.5 border border-gray-700"
                                >
                                    {STOCKS.map(s => (
                                        <option key={s.code} value={s.code}>{s.name} ({s.code})</option>
                                    ))}
                                </select>
                            </div>
                            <PriceChart stockCode={selectedPriceStock} />
                        </div>

                        {/* 光模块市场规模 */}
                        <div className="glass rounded-xl p-5">
                            <h3 className="text-lg font-semibold text-white mb-4">🌐 光模块市场规模预测</h3>
                            <MarketSizeChart />
                        </div>

                        {/* 800G/1.6T出货量 */}
                        <div className="glass rounded-xl p-5">
                            <h3 className="text-lg font-semibold text-white mb-4">🚀 800G/1.6T出货量对比</h3>
                            <ShipmentChart />
                        </div>

                        {/* 估值对比 */}
                        <div className="glass rounded-xl p-5">
                            <h3 className="text-lg font-semibold text-white mb-4">📊 核心标的估值对比</h3>
                            <ValuationChart />
                        </div>
                    </div>

                    {/* 市值分布 + 策略 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass rounded-xl p-5">
                            <h3 className="text-lg font-semibold text-white mb-4">🥧 市值分布</h3>
                            <MarketCapPie />
                        </div>
                        <div className="glass rounded-xl p-5">
                            <h3 className="text-lg font-semibold text-white mb-4">🎯 投资策略框架</h3>
                            <div className="space-y-3 text-sm">
                                <div className="p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
                                    <div className="font-semibold text-emerald-400 mb-1">核心持仓 (30-40%)</div>
                                    <div className="text-gray-400">中际旭创、新易盛 — 光模块双龙头，800G/1.6T核心受益，中期持有1-3年</div>
                                </div>
                                <div className="p-3 rounded-lg bg-blue-500/10 border border-blue-500/20">
                                    <div className="font-semibold text-blue-400 mb-1">卫星持仓 (40-50%)</div>
                                    <div className="text-gray-400">天孚通信、源杰科技、胜宏科技、沪电股份、仕佳光子、华工科技、光迅科技 — 产业链关键环节，短线6-12月波段操作</div>
                                </div>
                                <div className="p-3 rounded-lg bg-amber-500/10 border border-amber-500/20">
                                    <div className="font-semibold text-amber-400 mb-1">观察持仓 (5-10%)</div>
                                    <div className="text-gray-400">剑桥科技 — 高速光模块新秀，跟踪技术迭代和客户导入进度</div>
                                </div>
                                <div className="p-3 rounded-lg bg-purple-500/10 border border-purple-500/20">
                                    <div className="font-semibold text-purple-400 mb-1">核心驱动力</div>
                                    <div className="text-gray-400">AI算力需求爆发 → 数据中心光互连升级 → 800G/1.6T渗透率提升 → 国产替代加速</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== 页面：StockDetail ====================
        const StockDetail = ({ stockCode, onBack }) => {
            const stock = STOCKS.find(s => s.code === stockCode);
            const [activeTab, setActiveTab] = useState('overview');

            if (!stock) return null;

            const tabs = [
                { id: 'overview', label: '概览', icon: '📋' },
                { id: 'financial', label: '财务', icon: '💹' },
                { id: 'valuation', label: '估值', icon: '⚖️' },
                { id: 'forecast', label: '预判', icon: '🔮' },
            ];

            return (
                <div className="animate-fade-in space-y-6">
                    {/* 头部信息 */}
                    <div className="glass rounded-xl p-5">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={onBack} className="text-blue-400 hover:text-blue-300 text-sm flex items-center gap-1">
                                ← 返回看板
                            </button>
                            <span className={`badge ${getBadgeClass(stock.position_suggestion)}`}>{stock.position_suggestion}</span>
                        </div>
                        <div className="flex flex-wrap items-end gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-white">{stock.name}</h1>
                                <div className="text-gray-400 text-sm">{stock.code} · {stock.category}</div>
                            </div>
                            <div className="ml-auto text-right">
                                <div className="text-3xl font-bold gradient-text">¥{stock.price}</div>
                                <div className="text-sm text-gray-400">市值 {stock.market_cap}亿 | PE {stock.pe_ttm} | PEG {stock.peg > 50 ? 'N/A' : stock.peg}</div>
                            </div>
                        </div>
                    </div>

                    {/* Tab导航 */}
                    <div className="flex border-b border-gray-700">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`px-5 py-3 text-sm font-medium transition-colors ${activeTab === tab.id ? 'tab-active' : 'text-gray-400 hover:text-gray-300'}`}
                            >
                                {tab.icon} {tab.label}
                            </button>
                        ))}
                    </div>

                    {/* Tab内容 */}
                    <div className="space-y-6">
                        {activeTab === 'overview' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">2025营收</div>
                                        <div className="text-xl font-bold text-white">{stock.revenue_2025}亿</div>
                                        <div className="text-xs text-emerald-400">+{stock.revenue_growth_yoy}%</div>
                                    </div>
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">2025净利</div>
                                        <div className="text-xl font-bold text-white">{stock.net_profit_2025}亿</div>
                                        <div className="text-xs text-emerald-400">{stock.profit_growth_yoy > 900 ? '扭亏' : `+${stock.profit_growth_yoy}%`}</div>
                                    </div>
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">ROE</div>
                                        <div className="text-xl font-bold text-white">{stock.roe_2025}%</div>
                                        <div className="text-xs text-blue-400">加权平均</div>
                                    </div>
                                    <div className="glass rounded-lg p-4 text-center">
                                        <div className="text-gray-400 text-xs mb-1">毛利率</div>
                                        <div className="text-xl font-bold text-white">{stock.gross_margin_2025}%</div>
                                        <div className="text-xs text-blue-400">2025年度</div>
                                    </div>
                                </div>
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-lg font-semibold text-white mb-4">📈 180日股价走势</h3>
                                    <PriceChart stockCode={stock.code} height={280} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-emerald-400 mb-3">✅ 核心驱动力</h3>
                                        <div className="space-y-2 text-sm text-gray-400">
                                            {stock.category.includes('光模块') && (
                                                <>
                                                    <div>• AI算力需求驱动800G/1.6T光模块放量</div>
                                                    <div>• 全球数据中心光互连升级周期</div>
                                                    <div>• 国产替代加速，份额持续提升</div>
                                                    <div>• 硅光/CPO技术领先布局</div>
                                                </>
                                            )}
                                            {stock.category === '光器件/光引擎' && (
                                                <>
                                                    <div>• 高速光引擎需求随光模块放量</div>
                                                    <div>• 有源/无源器件技术壁垒高</div>
                                                    <div>• 泰国产能释放，全球化布局</div>
                                                </>
                                            )}
                                            {stock.category === '光芯片' && (
                                                <>
                                                    <div>• 国产光芯片替代进口加速</div>
                                                    <div>• CW光源/EML芯片需求爆发</div>
                                                    <div>• 激光雷达/卫星通信新场景拓展</div>
                                                </>
                                            )}
                                            {stock.category === 'PCB' && (
                                                <>
                                                    <div>• AI服务器/HPC高多层PCB需求</div>
                                                    <div>• 高速交换机PCB量价齐升</div>
                                                    <div>• 泰国/越南产能全球化布局</div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    <div className="glass rounded-xl p-5">
                                        <h3 className="text-lg font-semibold text-red-400 mb-3">⚠️ 风险因素</h3>
                                        <div className="space-y-2 text-sm text-gray-400">

                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                        {activeTab === 'valuation' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="glass rounded-xl p-5">

                                    <div className="grid grid-cols-3 gap-4 mt-4">
                                        <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-center">
                                            <div className="text-xs text-red-400 mb-1">悲观情景</div>
                                            <div className="text-xl font-bold text-white">¥{stock.dcf_pessimistic}</div>
                                            <div className="text-xs text-gray-500">增长率×0.6</div>

                                        <div className="p-3 rounded-lg bg-blue-500/10 border border-blue-500/20 text-center">

                                            <div className="text-xs text-gray-500">基准增长率</div>
                                        </div>
                                        <div className="p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-center">

                                            <div className="text-xl font-bold text-white">¥{stock.dcf_optimistic}</div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                                        <div className="space-y-3">

                                                <span className="font-medium text-white">{stock.pe_ttm}x</span>
                                            </div>
                                            <div className="flex justify-between items-center py-2 border-b border-gray-800">
                                                <span className="text-gray-400">PEG</span>
                                                <span className={`font-medium ${stock.peg < 1 ? 'text-emerald-400' : 'text-amber-400'}`}>{stock.peg > 50 ? 'N/A' : stock.peg}</span>
                                            </div>
                                            <div className="flex justify-between items-center py-2 border-b border-gray-800">
                                                <span className="text-gray-400">PB</span>
                                                <span className="font-medium text-white">{stock.pb}x</span>
                                            </div>
                                            <div className="flex justify-between items-center py-2 border-b border-gray-800">
                                                <span className="text-gray-400">PS</span>
                                                <span className="font-medium text-white">{stock.ps}x</span>
                                            </div>
                                            <div className="flex justify-between items-center py-2 border-b border-gray-800">
                                                <span className="text-gray-400">EV/EBITDA</span>
                                                <span className="font-medium text-white">{(stock.pe_ttm * 0.7).toFixed(1)}x</span>
                                            </div>
                                            <div className="flex justify-between items-center py-2">
                                                <span className="text-gray-400">股息率</span>

                                                <div className="text-xs text-gray-500 mt-1">基于{stock.rating}评级</div>
                                            </div>
                                            <div className="p-3 rounded-lg bg-blue-500/10 border border-blue-500/20">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-blue-400 font-medium">当前股价</span>
                                                    <span className="text-xl font-bold text-white">¥{stock.price}</span>
                                                </div>
                                                <div className="text-xs text-gray-500 mt-1">潜在上涨空间</div>
                                            </div>
                                            <div className={`p-3 rounded-lg border ${stock.upside > 0 ? 'bg-emerald-500/10 border-emerald-500/20' : 'bg-red-500/10 border-red-500/20'}`}>

                                                    <span className={stock.upside > 0 ? 'text-emerald-400 font-medium' : 'text-red-400 font-medium'}>上涨空间</span>
                                                    <span className={`text-xl font-bold ${stock.upside > 0 ? 'text-emerald-400' : 'text-red-400'}`}>{stock.upside > 0 ? '+' : ''}{stock.upside}%</span>
                                                </div>

                                    <div className="text-sm text-gray-400 space-y-2">
                                        <div><span className="text-blue-400 font-medium">DCF模型：</span>采用WACC 10%，永续增长率3%，预测期5年。自由现金流假设为净利润的85%。</div>
                                        <div><span className="text-blue-400 font-medium">PE Band：</span>基于历史PE区间和盈利预测，当前PE处于历史中低位，反映市场对增速放缓的担忧。</div>
                                        <div><span className="text-blue-400 font-medium">PEG估值：</span>对于高成长标的，PEG &lt; 1视为低估。光模块龙头PEG普遍低于0.5，估值吸引力显著。</div>
                                        <div><span className="text-blue-400 font-medium">同业比较：</span>与海外光模块龙头（Coherent、Fabrinet）相比，A股标的估值折价约30-50%。</div>
                                    </div>
                                </div>
                            </div>

                        {activeTab === 'forecast' && (
                            <div className="space-y-6 animate-fade-in">

                                            <div>• 硅光技术渗透率提升，成本持续下降</div>
                                            <div>• CPO/NPO长期技术路线明确，提前布局者受益</div>
                                            <div>• 国产算力建设加速，国内光模块需求增量可观</div>
                                        </div>
                                    </div>

                                        <h3 className="text-lg font-semibold text-red-400 mb-3">🔴 风险预警</h3>
                                        <div className="space-y-2 text-sm text-gray-400">
                                            <div>• 2026Q1新易盛/天孚通信净利环比下滑，需关注Q2恢复</div>

                                        </div>
                                    </div>
                                </div>
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-lg font-semibold text-white mb-3">📅 定期追踪计划</h3>

                                        </div>
                                        <div className="flex items-center gap-3 p-3 rounded-lg bg-dark-700/50">
                                            <span className="text-purple-400 font-medium w-16">每月</span>
                                            <span className="text-gray-400">财务数据更新、机构评级变动跟踪、估值模型重算</span>
                                        </div>
                                        <div className="flex items-center gap-3 p-3 rounded-lg bg-dark-700/50">
                                            <span className="text-emerald-400 font-medium w-16">每季</span>
                                            <span className="text-gray-400">财报深度分析、业绩预测修正、供应链调研</span>
                                        </div>
                                        <div className="flex items-center gap-3 p-3 rounded-lg bg-dark-700/50">
                                            <span className="text-amber-400 font-medium w-16">每年</span>
                                            <span className="text-gray-400">投资策略调整、行业格局重评、标的池优化</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== 主应用 ====================
        const App = () => {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [selectedStock, setSelectedStock] = useState(null);

            const handleSelectStock = (code) => {
                setSelectedStock(code);
                setCurrentPage('detail');
            };

            const handleBack = () => {
                setCurrentPage('dashboard');
                setSelectedStock(null);
            };

            return (
                <div className="min-h-screen bg-dark-900">
                    {/* 顶部导航 */}
                    <header className="sticky top-0 z-50 glass border-b border-gray-800/50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">AI</div>
                                <div>
                                    <h1 className="text-lg font-bold text-white">AI光模块产业链投资看板</h1>
                                    <div className="text-xs text-gray-500">数据更新: 2025年报 | 10只核心标的</div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-xs text-gray-500 hidden md:inline">💡 提示: 点击表格行查看详情</span>
                            </div>
                        </div>
                    </header>

                    {/* 主内容 */}
                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {currentPage === 'dashboard' && <Dashboard onSelectStock={handleSelectStock} />}
                        {currentPage === 'detail' && <StockDetail stockCode={selectedStock} onBack={handleBack} />}
                    </main>

                    {/* 底部 */}
                    <footer className="border-t border-gray-800/50 mt-12 py-6">
                        <div className="max-w-7xl mx-auto px-4 text-center text-xs text-gray-600">
                            <div>AI光模块产业链投资看板 | 数据来源: 公司年报/业绩快报 | 仅供参考，不构成投资建议</div>
                            <div className="mt-1">© 2026 | 估值模型: DCF/PE/PEG | 追踪频率: 周/月/季/年</div>
                        </div>
                    </footer>
                </div>
            );
        };

        // 渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
